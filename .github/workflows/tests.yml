name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The tests only need the web/auth deps; the whisper stack is imported
      # lazily and isn't exercised, so we skip it to keep CI fast.
      - run: pip install flask google-auth requests
      - run: python -m unittest discover -s tests
