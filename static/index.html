<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Plate — voice calorie log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,560;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async></script>
<script>(function(){try{var t=localStorage.getItem("theme");if(!t)t=matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";if(t==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
<style>
  :root{
    --bg:#FBF9F4; --ink:#1B1A17; --muted:#8A857B; --line:#E7E2D6;
    --accent:#E1521D; --accent-soft:#FBE7DC; --green:#5C7A52; --card:#FFFFFF;
    --chip-bd:#f3cdb9; --chip-miss-bg:#f4f1ea; --mic-glow:rgba(225,82,29,.35); --offline-bg:#fbe7dc;
    --shadow:0 1px 2px rgba(27,26,23,.04), 0 8px 24px rgba(27,26,23,.05);
  }
  html[data-theme="dark"]{
    --bg:#141218; --ink:#ECEAF2; --muted:#9B94A8; --line:#2B2833;
    --accent:#B49DFF; --accent-soft:#2A2440; --green:#9DBF8E; --card:#1E1B24;
    --chip-bd:#4A3F6B; --chip-miss-bg:#232029; --mic-glow:rgba(180,157,255,.40); --offline-bg:#2A2440;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 10px 28px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; background:var(--bg); color:var(--ink); font-family:"IBM Plex Sans",system-ui,sans-serif;}
  ::placeholder{color:var(--muted); opacity:1;}
  .wrap{max-width:480px; margin:0 auto; min-height:100dvh; padding:20px 18px 40px; display:flex; flex-direction:column;}
  header{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px;}
  .brand{font-family:"Fraunces",serif; font-weight:600; font-size:22px; letter-spacing:-.01em;}
  .brand span{color:var(--accent);}
  .datepick{font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--muted); display:flex; gap:8px; align-items:center;}
  .datepick button{background:none; border:1px solid var(--line); color:var(--muted); width:26px; height:26px; border-radius:8px; font-size:14px; cursor:pointer; line-height:1;}
  .datepick button:active{background:var(--line);}
  .datepick .d{min-width:90px; text-align:center;}
  .total{background:var(--card); border:1px solid var(--line); border-radius:20px; padding:22px 22px 18px; box-shadow:var(--shadow); margin:14px 0 18px; text-align:center;}
  .total .num{font-family:"Fraunces",serif; font-weight:600; font-size:62px; line-height:1; letter-spacing:-.03em; font-variant-numeric:tabular-nums; color:var(--accent);}
  .total .lab{font-family:"IBM Plex Mono",monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-top:6px;}
  .total .protein{font-family:"IBM Plex Mono",monospace; font-size:13px; font-weight:600; color:var(--green); margin-top:8px; font-variant-numeric:tabular-nums;}
  .total .meals{display:flex; gap:10px; justify-content:center; margin-top:14px; flex-wrap:wrap;}
  .total .meal{font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--muted);}
  .total .meal b{color:var(--ink); font-weight:600;}
  .console{display:flex; flex-direction:column; align-items:center; gap:14px; margin-bottom:14px;}
  .mic{position:relative; width:84px; height:84px; border-radius:50%; border:none; cursor:pointer; background:var(--accent); color:#fff; display:grid; place-items:center; box-shadow:0 10px 30px var(--mic-glow); transition:transform .12s ease;}
  .mic:active{transform:scale(.95);}
  .mic svg{width:34px; height:34px;}
  .mic.listening{animation:bob 1.4s ease-in-out infinite;}
  .mic .ring{position:absolute; inset:0; border-radius:50%; border:2px solid var(--accent); opacity:0;}
  .mic.listening .ring{animation:ring 1.6s ease-out infinite;}
  .mic.listening .ring:nth-child(2){animation-delay:.5s;}
  @keyframes ring{0%{opacity:.5; transform:scale(1);}100%{opacity:0; transform:scale(1.9);}}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
  .hint{font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--muted); height:14px; text-align:center;}
  .field{width:100%; display:flex; gap:8px;}
  .field input{flex:1; font-family:"IBM Plex Sans",sans-serif; font-size:15px; color:var(--ink); background:var(--card); border:1px solid var(--line); border-radius:14px; padding:13px 15px; outline:none;}
  .field input:focus{border-color:var(--accent);}
  .field .go{background:var(--ink); color:var(--bg); border:none; border-radius:14px; padding:0 18px; font-family:"IBM Plex Sans",sans-serif; font-size:15px; font-weight:600; cursor:pointer;}
  .field .go:active{opacity:.85;}
  .preview{display:flex; flex-wrap:wrap; gap:7px; margin-top:2px;}
  .chip{font-family:"IBM Plex Mono",monospace; font-size:12px; padding:6px 10px; border-radius:999px; background:var(--accent-soft); color:var(--accent); border:1px solid var(--chip-bd);}
  .chip.miss{background:var(--chip-miss-bg); color:var(--muted); border-color:var(--line);}
  .pending{margin-top:10px;}
  .pending .pendlab{font-family:"IBM Plex Mono",monospace; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:7px;}
  .pending .chips{display:flex; flex-wrap:wrap; gap:7px;}
  .chip.add{cursor:pointer; background:var(--card); color:var(--accent); border:1px solid var(--accent); transition:background .12s ease, transform .1s ease;}
  .chip.add:active{transform:scale(.96); background:var(--accent-soft);}
  .chip.add::before{content:"+ "; font-weight:600;}
  .pendgroup{display:inline-flex; align-items:center; gap:6px; padding:5px 8px; border:1px dashed var(--accent); border-radius:16px; background:var(--accent-soft);}
  .pendgroup .glab{font-family:"IBM Plex Mono",monospace; font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); opacity:.85;}
  .pendgroup .chip.add{background:var(--card);}
  .tabs{display:flex; gap:6px; margin:18px 0 10px;}
  .tabs button{flex:1; font-family:"IBM Plex Mono",monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; padding:9px 0; border-radius:10px; border:1px solid var(--line); background:var(--card); color:var(--muted); cursor:pointer;}
  .tabs button.on{background:var(--ink); color:var(--bg); border-color:var(--ink);}
  .log{list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:8px;}
  .row{display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 14px; box-shadow:var(--shadow);}
  .row .nm{flex:1; font-size:15px; font-weight:500;}
  .row .nm small{display:block; font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--muted); font-weight:400; margin-top:2px;}
  .row .cal{font-family:"IBM Plex Mono",monospace; font-weight:600; font-size:15px; font-variant-numeric:tabular-nums;}
  .row .cal span{font-size:11px; color:var(--muted); margin-left:2px;}
  .row .del{background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:0 2px; line-height:1;}
  .row .del:active{color:var(--accent);}
  .empty{font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--muted); text-align:center; padding:22px 0;}
  details.ref{margin-top:24px; border-top:1px solid var(--line); padding-top:16px;}
  details.ref summary{font-family:"IBM Plex Mono",monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); cursor:pointer; list-style:none;}
  details.ref summary::-webkit-details-marker{display:none;}
  details.ref summary::after{content:" +";}
  details.ref[open] summary::after{content:" –";}
  .reflist{margin-top:12px; display:flex; flex-direction:column; gap:6px;}
  .refrow{display:flex; align-items:center; gap:8px; font-family:"IBM Plex Mono",monospace; font-size:12px;}
  .refrow .rn{flex:1;}
  .refrow .rv{color:var(--muted);}
  .refrow .redit{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;}
  .refrow .rdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;}
  .addref #rCancel{background:none; border:1px solid var(--line); color:var(--muted);}
  .addref{display:flex; gap:6px; margin-top:12px; flex-wrap:wrap;}
  .addref input,.addref select{font-family:"IBM Plex Mono",monospace; font-size:12px; padding:8px 9px; border:1px solid var(--line); border-radius:9px; background:var(--card); color:var(--ink); outline:none; min-width:0;}
  .addref select option{background:var(--card); color:var(--ink);}
  .addref input.nm{flex:2 1 110px;} .addref input.cl{flex:1 1 60px;} .addref select{flex:1 1 70px;}
  .addref button{background:var(--green); color:var(--bg); border:none; border-radius:9px; padding:8px 14px; font-family:"IBM Plex Sans",sans-serif; font-size:13px; font-weight:600; cursor:pointer;}
  .note{font-family:"IBM Plex Mono",monospace; font-size:10.5px; color:var(--muted); line-height:1.6; margin-top:14px;}
  .offline{background:var(--offline-bg); color:var(--accent); font-family:"IBM Plex Mono",monospace; font-size:11px; text-align:center; padding:8px; border-radius:10px; margin-bottom:10px; display:none;}
  .login{position:fixed; inset:0; background:var(--bg); display:none; place-items:center; z-index:50; padding:24px;}
  .loginCard{background:var(--card); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow); padding:34px 30px; text-align:center; max-width:340px; width:100%;}
  .loginCard .brand{font-family:"Fraunces",serif; font-weight:600; font-size:30px; margin-bottom:10px;}
  .loginCard .brand span{color:var(--accent);}
  .loginHint{font-family:"IBM Plex Sans",sans-serif; font-size:14px; color:var(--muted); margin:0 0 22px;}
  .loginCard #gbtn{display:flex; justify-content:center;}
  .hgroup{display:flex; align-items:center; gap:8px;}
  .iconbtn{background:none; border:none; cursor:pointer; color:var(--ink); padding:2px; display:grid; place-items:center; line-height:1;}
  .iconbtn svg{width:24px; height:24px;}
  .drawer{position:fixed; inset:0; z-index:60; visibility:hidden;}
  .drawer.open{visibility:visible;}
  .drawerScrim{position:absolute; inset:0; background:rgba(27,26,23,.35); opacity:0; transition:opacity .2s ease;}
  .drawer.open .drawerScrim{opacity:1;}
  .drawerPanel{position:absolute; top:0; left:0; height:100%; width:min(330px,87vw); background:var(--bg); box-shadow:var(--shadow); padding:18px 18px 30px; transform:translateX(-100%); transition:transform .22s ease; display:flex; flex-direction:column; gap:14px; overflow-y:auto;}
  .drawer.open .drawerPanel{transform:translateX(0);}
  .drawerHead{display:flex; align-items:center; justify-content:space-between;}
  .drawerHead .drawerTitle{font-family:"Fraunces",serif; font-weight:600; font-size:20px;}
  .acctBox{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 14px; background:var(--card); border:1px solid var(--line); border-radius:14px;}
  .acctBox .who{font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .acctBox button{background:none; border:1px solid var(--line); color:var(--muted); border-radius:8px; padding:5px 10px; font-family:"IBM Plex Mono",monospace; font-size:11px; cursor:pointer;}
  .setrow{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 14px; background:var(--card); border:1px solid var(--line); border-radius:14px; font-size:14px; color:var(--ink);}
  .setrow .sun{font-size:18px; line-height:1; color:var(--ink);}
  .toggle{position:relative; width:46px; height:26px; border-radius:999px; border:1px solid var(--line); background:var(--line); cursor:pointer; padding:0; transition:background .18s ease, border-color .18s ease; flex:none;}
  .toggle .knob{position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:var(--card); transition:transform .18s ease; box-shadow:0 1px 2px rgba(0,0,0,.3);}
  .toggle[aria-checked="true"]{background:var(--accent); border-color:var(--accent);}
  .toggle[aria-checked="true"] .knob{transform:translateX(20px);}
  .fhead{font-family:"IBM Plex Mono",monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-top:6px;}
  .addfriend{display:flex; gap:6px;}
  .addfriend input{flex:1; min-width:0; font-family:"IBM Plex Sans",sans-serif; font-size:13px; border:1px solid var(--line); border-radius:10px; padding:9px 11px; background:var(--card); outline:none;}
  .addfriend input:focus{border-color:var(--accent);}
  .addfriend button{background:var(--green); color:var(--bg); border:none; border-radius:10px; padding:0 14px; font-family:"IBM Plex Sans",sans-serif; font-size:13px; font-weight:600; cursor:pointer;}
  .fmsg{font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--accent); min-height:13px;}
  .fsub{font-family:"IBM Plex Mono",monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:10px 0 2px;}
  .fcard{display:flex; align-items:center; gap:8px; padding:10px 0; border-bottom:1px solid var(--line);}
  .fcard .fn{flex:1; font-size:14px; min-width:0;}
  .fcard .fn small{display:block; font-family:"IBM Plex Mono",monospace; font-size:10.5px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .fcard .ft{font-family:"IBM Plex Mono",monospace; font-size:11px; text-align:right; color:var(--muted); line-height:1.4;}
  .fcard .ft b{color:var(--accent); font-size:14px;}
  .fcard .pendtag{font-family:"IBM Plex Mono",monospace; font-size:10px; color:var(--muted);}
  .mini{background:none; border:1px solid var(--line); color:var(--muted); border-radius:8px; padding:5px 9px; font-family:"IBM Plex Mono",monospace; font-size:11px; cursor:pointer;}
  .mini.ok{background:var(--green); color:var(--bg); border-color:var(--green);}
  .acct button:active{background:var(--line);}
</style>
</head>
<body>
<div class="login" id="login">
  <div class="loginCard">
    <div class="brand">Plate<span>.</span></div>
    <p class="loginHint">Sign in to track your calories.</p>
    <div id="gbtn"></div>
  </div>
</div>
<div class="drawer" id="drawer">
  <div class="drawerScrim" id="drawerScrim"></div>
  <aside class="drawerPanel">
    <div class="drawerHead">
      <div class="drawerTitle">Menu</div>
      <button class="iconbtn" id="closeMenu" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="acctBox">
      <div class="who" id="who"></div>
      <button id="signout">Sign out</button>
    </div>
    <div class="setrow">
      <span class="sun" aria-hidden="true">☀</span>
      <button class="toggle" id="themeToggle" role="switch" aria-checked="false" aria-label="Dark mode"><span class="knob"></span></button>
    </div>
    <div class="fhead">Friends</div>
    <div class="addfriend">
      <input id="friendEmail" placeholder="friend's email" autocomplete="off" inputmode="email">
      <button id="friendAdd">Add</button>
    </div>
    <div class="fmsg" id="friendMsg"></div>
    <div id="friendSections"></div>
  </aside>
</div>
<div class="wrap">
  <div class="offline" id="offline">backend not reachable — start app.py</div>
  <header>
    <div class="hgroup">
      <button class="iconbtn" id="menuBtn" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="brand">Plate<span>.</span></div>
    </div>
    <div class="datepick">
      <button id="prev">‹</button><span class="d" id="dlabel">Today</span><button id="next">›</button>
    </div>
  </header>

  <div class="total">
    <div class="num" id="totalNum">0</div>
    <div class="lab">kcal logged today</div>
    <div class="protein" id="proteinNum">0 g protein</div>
    <div class="meals" id="mealBreak"></div>
  </div>

  <div class="console">
    <button class="mic" id="mic" aria-label="Tap to speak">
      <span class="ring"></span><span class="ring"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M12 19v3"/>
      </svg>
    </button>
    <div class="hint" id="hint">tap mic, or type below</div>
    <div class="field">
      <input id="text" placeholder="tomatoes 80 g, chicken thigh 90 g" autocomplete="off">
      <button class="go" id="addBtn">Add</button>
    </div>
    <div class="preview" id="preview"></div>
    <div class="pending" id="pending"></div>
  </div>

  <div class="tabs" id="tabs">
    <button data-m="Breakfast" class="on">Breakfast</button>
    <button data-m="Lunch">Lunch</button>
    <button data-m="Dinner">Dinner</button>
    <button data-m="Snacks">Snacks</button>
  </div>

  <ul class="log" id="log"></ul>

  <details class="ref">
    <summary>Reference table</summary>
    <div class="reflist" id="reflist"></div>
    <div class="addref">
      <input class="nm" id="rName" placeholder="item name">
      <input class="cl" id="rCal" placeholder="cal" inputmode="decimal">
      <input class="cl" id="rProtein" placeholder="protein" inputmode="decimal">
      <select id="rUnit"><option value="g">per gram</option><option value="piece">per piece</option></select>
      <button id="rAdd">Save</button>
      <button id="rCancel" style="display:none">Cancel</button>
    </div>
    <div class="note">Tap the mic, speak, tap again to stop. Audio is transcribed by the backend, so voice works in any browser.</div>
  </details>
</div>

<script>
const API = "";

let DAY = new Date();
let MEAL = "Breakfast";
let DAYDATA = {Breakfast:[],Lunch:[],Dinner:[],Snacks:[]};

const keyOf = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const sameDay = (a,b) => keyOf(a)===keyOf(b);
function dLabel(d){
  const t=new Date();
  if(sameDay(d,t)) return "Today";
  const y=new Date(t); y.setDate(y.getDate()-1);
  if(sameDay(d,y)) return "Yesterday";
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric"});
}

async function api(path, opts){
  const r = await fetch(API+path, Object.assign({headers:{"Content-Type":"application/json"}}, opts));
  if(r.status===401){ showLogin(); throw new Error("auth_required"); }
  if(!r.ok) throw new Error("HTTP "+r.status);
  document.getElementById("offline").style.display="none";
  return r.json();
}
function offline(){ document.getElementById("offline").style.display="block"; }

let REFCACHE=[], editRefId=null;
async function loadRef(){
  try{
    const ref = await api("/api/reference");
    REFCACHE = ref;
    const box = document.getElementById("reflist");
    box.innerHTML = ref.length ? ref.map(it=>`
      <div class="refrow">
        <span class="rn">${it.name}</span>
        <span class="rv">${it.cal} cal · ${it.protein} P /${it.unit}</span>
        <button class="redit" data-id="${it.id}">✎</button>
        <button class="rdel" data-id="${it.id}">×</button>
      </div>`).join("") : `<div class="empty">no foods yet — add one below</div>`;
    box.querySelectorAll(".redit").forEach(b=>b.onclick=()=>startEditRef(+b.dataset.id));
    box.querySelectorAll(".rdel").forEach(b=>b.onclick=async()=>{
      if(editRefId===+b.dataset.id) cancelEditRef();
      try{ await api("/api/reference/"+b.dataset.id,{method:"DELETE"}); loadRef(); }catch(e){ offline(); }
    });
  }catch(e){ offline(); }
}
function startEditRef(id){
  const it=REFCACHE.find(x=>x.id===id); if(!it) return;
  document.getElementById("rName").value=it.name;
  document.getElementById("rCal").value=it.cal;
  document.getElementById("rProtein").value=it.protein;
  document.getElementById("rUnit").value=it.unit;
  editRefId=id;
  document.getElementById("rAdd").textContent="Update";
  document.getElementById("rCancel").style.display="";
  document.getElementById("rName").focus();
}
function cancelEditRef(){
  editRefId=null;
  document.getElementById("rAdd").textContent="Save";
  document.getElementById("rCancel").style.display="none";
  document.getElementById("rName").value=""; document.getElementById("rCal").value=""; document.getElementById("rProtein").value="";
}
document.getElementById("rCancel").onclick=cancelEditRef;
document.getElementById("rAdd").onclick=async()=>{
  const name=document.getElementById("rName").value.trim();
  const cal=parseFloat(document.getElementById("rCal").value);
  const protein=parseFloat(document.getElementById("rProtein").value)||0;
  const unit=document.getElementById("rUnit").value;
  if(!name||isNaN(cal))return;
  try{
    if(editRefId!=null){
      await api("/api/reference/"+editRefId,{method:"PUT",body:JSON.stringify({name,cal,protein,unit})});
      cancelEditRef();
      loadRef(); loadDay();   // log entries may have changed, refresh totals
    }else{
      await api("/api/reference",{method:"POST",body:JSON.stringify({name,cal,protein,unit})});
      document.getElementById("rName").value=""; document.getElementById("rCal").value=""; document.getElementById("rProtein").value="";
      loadRef();
    }
  }catch(e){ offline(); }
};

async function loadDay(){
  document.getElementById("dlabel").textContent=dLabel(DAY);
  try{
    DAYDATA = await api("/api/log/"+keyOf(DAY));
  }catch(e){ offline(); DAYDATA={Breakfast:[],Lunch:[],Dinner:[],Snacks:[]}; }
  render();
  if(document.getElementById("drawer").classList.contains("open")) loadFriends();
}
function mealTotal(m){ return (DAYDATA[m]||[]).reduce((s,e)=>s+e.cal,0); }
function dayTotal(){ return ["Breakfast","Lunch","Dinner","Snacks"].reduce((s,m)=>s+mealTotal(m),0); }
function proteinTotal(){ return ["Breakfast","Lunch","Dinner","Snacks"].reduce((s,m)=>s+(DAYDATA[m]||[]).reduce((t,e)=>t+(e.protein||0),0),0); }
function render(){
  document.getElementById("totalNum").textContent=dayTotal();
  document.getElementById("proteinNum").textContent=Math.round(proteinTotal()*10)/10+" g protein";
  document.getElementById("mealBreak").innerHTML=
    ["Breakfast","Lunch","Dinner","Snacks"].map(m=>`<div class="meal">${m[0]} <b>${mealTotal(m)}</b></div>`).join("");
  const items=DAYDATA[MEAL]||[];
  const ul=document.getElementById("log");
  if(!items.length){ ul.innerHTML=`<div class="empty">no ${MEAL.toLowerCase()} logged yet</div>`; return; }
  ul.innerHTML=items.map(e=>`
    <li class="row">
      <div class="nm">${e.name}<small>${e.qty} ${e.unit==="g"?"g":(e.qty===1?"piece":"pieces")} · ${e.protein||0} g protein</small></div>
      <div class="cal">${e.cal}<span>kcal</span></div>
      <button class="del" data-id="${e.id}" aria-label="remove">×</button>
    </li>`).join("");
  ul.querySelectorAll(".del").forEach(b=>b.onclick=async()=>{
    try{ DAYDATA = await api(`/api/log/${keyOf(DAY)}/${MEAL}/${b.dataset.id}`,{method:"DELETE"}); render(); }
    catch(e){ offline(); }
  });
}

let pvTimer=null;
function showPreview(raw){
  clearTimeout(pvTimer);
  const pv=document.getElementById("preview");
  if(!raw.trim()){ pv.innerHTML=""; return; }
  pvTimer=setTimeout(async()=>{
    try{
      const {parsed}=await api("/api/parse",{method:"POST",body:JSON.stringify({text:raw})});
      pv.innerHTML=parsed.map(p=>p.ok
        ?`<span class="chip">${p.name} · ${p.qty}${p.unit==="g"?"g":"×"} · ${p.cal} cal · ${p.protein||0} P${p.alts?` +${p.alts.length-1}`:""}</span>`
        :`<span class="chip miss">? ${p.name}</span>`).join("");
    }catch(e){ offline(); }
  },220);
}
async function commit(raw){
  if(!raw.trim())return false;
  try{
    const res=await api("/api/log/"+keyOf(DAY),{method:"POST",body:JSON.stringify({meal:MEAL,text:raw})});
    DAYDATA=res.day; render();
    document.getElementById("text").value="";
    document.getElementById("preview").innerHTML="";
    return res.added.length>0;
  }catch(e){ offline(); return false; }
}

let PENDING=[];
const optLabel=o=>`${o.name} · ${o.qty}${o.unit==="g"?"g":"×"} · ${o.cal} cal · ${o.protein||0} P`;
function renderPending(){
  const el=document.getElementById("pending");
  if(!PENDING.length){ el.innerHTML=""; return; }
  el.innerHTML=`<div class="pendlab">tap to add to ${MEAL}</div><div class="chips">`+
    PENDING.map((g,gi)=>{
      if(g.options.length===1)
        return `<span class="chip add" data-g="${gi}" data-o="0">${optLabel(g.options[0])}</span>`;
      return `<span class="pendgroup" data-g="${gi}"><span class="glab">one of</span>`+
        g.options.map((o,oi)=>`<span class="chip add" data-g="${gi}" data-o="${oi}">${optLabel(o)}</span>`).join("")+
        `</span>`;
    }).join("")+`</div>`;
  el.querySelectorAll(".chip.add").forEach(c=>c.onclick=()=>approve(+c.dataset.g,+c.dataset.o));
}
async function approve(gi,oi){
  const g=PENDING[gi]; if(!g)return;
  const item=g.options[oi]; if(!item)return;
  try{
    const res=await api("/api/log/"+keyOf(DAY),{method:"POST",body:JSON.stringify({meal:MEAL,items:[{...item,ok:true}]})});
    DAYDATA=res.day; render();
    PENDING.splice(gi,1); renderPending();
  }catch(e){ offline(); }
}
async function stageFromVoice(raw){
  if(!raw.trim())return 0;
  try{
    const {parsed}=await api("/api/parse",{method:"POST",body:JSON.stringify({text:raw})});
    const groups=parsed.filter(p=>p.ok).map(p=>({
      options: p.alts || [{name:p.name,qty:p.qty,unit:p.unit,cal:p.cal,protein:p.protein}],
    }));
    PENDING.push(...groups); renderPending();
    return groups.length;
  }catch(e){ offline(); return 0; }
}

const textEl=document.getElementById("text");
textEl.addEventListener("input",e=>showPreview(e.target.value));
textEl.addEventListener("keydown",e=>{ if(e.key==="Enter")commit(textEl.value); });
document.getElementById("addBtn").onclick=()=>commit(textEl.value);
document.getElementById("tabs").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  MEAL=b.dataset.m;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle("on",x===b));
  render(); renderPending();
});
document.getElementById("prev").onclick=()=>{ DAY.setDate(DAY.getDate()-1); loadDay(); };
document.getElementById("next").onclick=()=>{ DAY.setDate(DAY.getDate()+1); loadDay(); };

const mic=document.getElementById("mic"), hint=document.getElementById("hint");
let asrReady=false, mediaRec=null, chunks=[], recording=false;

function initAsr(){
  api("/api/asr-status").then(s=>{
    asrReady = !!s.available;
    if(!asrReady){ hint.textContent="speech model not installed — type instead"; mic.style.opacity=.45; }
  }).catch(()=>{});
}

async function startRec(){
  if(!asrReady) return;
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRec = new MediaRecorder(stream);
    chunks = [];
    mediaRec.ondataavailable = e=>{ if(e.data && e.data.size) chunks.push(e.data); };
    mediaRec.onstop = async ()=>{
      stream.getTracks().forEach(t=>t.stop());
      const type = mediaRec.mimeType || "audio/webm";
      const blob = new Blob(chunks, {type});
      const ext = type.includes("ogg") ? "ogg" : (type.includes("wav") ? "wav" : "webm");
      hint.textContent = "transcribing…";
      const fd = new FormData();
      fd.append("audio", blob, "clip." + ext);
      try{
        const r = await fetch(API + "/api/transcribe", {method:"POST", body:fd});
        const data = await r.json();
        if(data.text){
          const n = await stageFromVoice(data.text);
          hint.textContent = n ? "tap items to add ↑" : `heard "${data.text}" — no match`;
        }else{
          hint.textContent = data.error === "asr_unavailable"
            ? "speech model not installed" : "couldn't transcribe, try again";
        }
      }catch(err){ hint.textContent = "transcription failed"; }
      setTimeout(()=>{ if(!recording) hint.textContent = PENDING.length ? "tap items to add ↑" : "tap mic, or type below"; }, 1800);
    };
    mediaRec.start();
    recording = true; mic.classList.add("listening");
    hint.textContent = "recording… tap to stop";
  }catch(err){ hint.textContent = "mic permission denied"; }
}
function stopRec(){ if(mediaRec && recording){ recording=false; mic.classList.remove("listening"); mediaRec.stop(); } }
mic.onclick = ()=>{ recording ? stopRec() : startRec(); };

const drawer=document.getElementById("drawer");
function openMenu(){ drawer.classList.add("open"); loadFriends(); }
function closeMenu(){ drawer.classList.remove("open"); }
document.getElementById("menuBtn").onclick=openMenu;
document.getElementById("closeMenu").onclick=closeMenu;
document.getElementById("drawerScrim").onclick=closeMenu;

const themeToggle=document.getElementById("themeToggle");
function currentTheme(){ return document.documentElement.getAttribute("data-theme")==="dark"?"dark":"light"; }
function applyTheme(t){
  if(t==="dark") document.documentElement.setAttribute("data-theme","dark");
  else document.documentElement.removeAttribute("data-theme");
  try{ localStorage.setItem("theme", t); }catch(e){}
  themeToggle.setAttribute("aria-checked", t==="dark");
}
themeToggle.setAttribute("aria-checked", currentTheme()==="dark");
themeToggle.onclick=()=>applyTheme(currentTheme()==="dark"?"light":"dark");

async function loadFriends(){
  try{
    const rel=await api("/api/friends");
    let totals=[];
    try{ totals=await api("/api/friends/totals/"+keyOf(DAY)); }catch(e){}
    renderFriends(rel, totals);
  }catch(e){ offline(); }
}
function frow(f, right){
  const sub=`${f.nick?(f.name?f.name+" · ":""):""}${f.email}`;
  return `<div class="fcard"><div class="fn">${f.nick||f.name||f.email}<small>${sub}</small></div>${right}</div>`;
}
async function editNick(fid, current){
  const nick=prompt("Nickname for this friend (leave blank to clear):", current);
  if(nick===null) return;
  try{ await api(`/api/friends/${fid}/nick`,{method:"POST",body:JSON.stringify({nick:nick.trim()})}); loadFriends(); }
  catch(e){ offline(); }
}
function renderFriends(rel, totals){
  const tmap={}; (totals||[]).forEach(t=>tmap[t.id]=t);
  const box=document.getElementById("friendSections");
  let html="";
  if(rel.incoming.length){
    html+=`<div class="fsub">requests</div>`;
    html+=rel.incoming.map(f=>frow(f,
      `<button class="mini ok" data-acc="${f.fid}">Accept</button><button class="mini" data-rm="${f.fid}">Decline</button>`)).join("");
  }
  html+=`<div class="fsub">friends · ${dLabel(DAY).toLowerCase()}</div>`;
  if(rel.friends.length){
    html+=rel.friends.map(f=>{ const t=tmap[f.id]||{cal:0,protein:0};
      return frow(f, `<div class="ft"><b>${t.cal}</b> kcal<br>${t.protein} g P</div><button class="mini" data-nick="${f.fid}">✎</button><button class="mini" data-rm="${f.fid}">×</button>`);
    }).join("");
  }else{
    html+=`<div class="empty">no friends yet — add by email above</div>`;
  }
  if(rel.outgoing.length){
    html+=`<div class="fsub">sent</div>`;
    html+=rel.outgoing.map(f=>frow(f, `<span class="pendtag">pending</span><button class="mini" data-rm="${f.fid}">×</button>`)).join("");
  }
  box.innerHTML=html;
  box.querySelectorAll("[data-acc]").forEach(b=>b.onclick=async()=>{
    try{ await api(`/api/friends/${b.dataset.acc}/accept`,{method:"POST"}); loadFriends(); }catch(e){ offline(); }
  });
  box.querySelectorAll("[data-nick]").forEach(b=>b.onclick=()=>{
    const f=rel.friends.find(x=>String(x.fid)===b.dataset.nick);
    editNick(b.dataset.nick, (f&&f.nick)||"");
  });
  box.querySelectorAll("[data-rm]").forEach(b=>b.onclick=async()=>{
    try{ await api(`/api/friends/${b.dataset.rm}`,{method:"DELETE"}); loadFriends(); }catch(e){ offline(); }
  });
}
async function addFriend(){
  const inp=document.getElementById("friendEmail"), msg=document.getElementById("friendMsg");
  const email=inp.value.trim(); if(!email) return;
  msg.textContent="";
  try{
    const r=await fetch(API+"/api/friends/request",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email})});
    const data=await r.json();
    if(!r.ok){ msg.textContent=data.error||"could not send request"; return; }
    inp.value="";
    msg.textContent = data.status==="accepted" ? "connected!" : "request sent";
    let totals=[]; try{ totals=await api("/api/friends/totals/"+keyOf(DAY)); }catch(e){}
    renderFriends(data, totals);
  }catch(e){ msg.textContent="could not send request"; }
}
document.getElementById("friendAdd").onclick=addFriend;
document.getElementById("friendEmail").addEventListener("keydown",e=>{ if(e.key==="Enter") addFriend(); });

let GOOGLE_CLIENT_ID=null, signedIn=false;

function showLogin(){
  if(signedIn) return;
  document.getElementById("login").style.display="grid";
  renderGoogle();
}
function renderGoogle(){
  const gbtn=document.getElementById("gbtn");
  if(!GOOGLE_CLIENT_ID){ gbtn.textContent="GOOGLE_CLIENT_ID not configured"; return; }
  if(!(window.google && google.accounts && google.accounts.id)){ return setTimeout(renderGoogle,100); }
  google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID, callback:onCredential});
  google.accounts.id.renderButton(gbtn,{theme:"outline", size:"large", shape:"pill", text:"continue_with"});
}
async function onCredential(resp){
  try{
    const {user}=await api("/api/auth/google",{method:"POST",body:JSON.stringify({credential:resp.credential})});
    onSignedIn(user);
  }catch(e){ document.getElementById("gbtn").textContent="sign-in failed, try again"; }
}
function onSignedIn(user){
  signedIn=true;
  document.getElementById("login").style.display="none";
  document.getElementById("who").textContent=user.email||user.name||"signed in";
  document.getElementById("signout").onclick=signOut;
  loadRef(); loadDay(); initAsr();
}
async function signOut(){
  try{ await api("/api/auth/logout",{method:"POST"}); }catch(e){}
  location.reload();
}
async function boot(){
  try{ GOOGLE_CLIENT_ID=(await api("/api/config")).google_client_id; }catch(e){ offline(); }
  let me={user:null};
  try{ me=await api("/api/auth/me"); }catch(e){}
  if(me.user) onSignedIn(me.user); else showLogin();
}
boot();
</script>
